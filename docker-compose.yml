services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rxflow
      POSTGRES_PASSWORD: rxflow
      POSTGRES_DB: rxflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rxflow -d rxflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build: ./backend
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-test-placeholder}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      CORS_ORIGINS: http://localhost:3000,http://localhost:8050
    ports:
      - "8001:8001"

  server:
    build: ./server
    environment:
      PORT: 8050
      DB_USER: rxflow
      DB_HOST: postgres
      DB_NAME: rxflow
      DB_PASSWORD: rxflow
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-rxflow_secret_key_2026}
      FASTAPI_SERVICE_URL: http://fastapi:8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-test-placeholder}
    ports:
      - "8050:8050"
    depends_on:
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_started

  client:
    build: ./client
    environment:
      REACT_APP_API_URL: http://localhost:8050
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:
